
server.port=8081


# ?? Database ??????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ?? JWT ???????????????????????????????????????????????????????????????????????
# Secret must be at least 32 characters (256 bits) for HS256.
# Change this to a long random string in production!
jwt.secret=MySuperSecretKeyForJWTThatIsAtLeast32Chars!
# Token validity: 24 hours in milliseconds (86400000)
jwt.expiration-ms=86400000

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web.filter=DEBUG
